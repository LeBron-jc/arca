name: CPUSched
version: "1.0"
category: scheduling
description: >
  CPU调度Agent。12个eBPF hook感知workload运行态，
  数据通过SharedStore上报LLM，LLM输出per-PID优先级(-100~+100)，
  SCX将优先级映射为vtime偏移和抢占行为。
  LLM未就绪时所有任务以normal优先级运行。

workload_perception:
  method: eBPF tracepoint (6 hooks)
  events:
    - sched_switch     → runtime, io_wait, d_state, preempt, cpu_migration
    - sched_wakeup     → wakeup_count, wakeup_interval
    - sched_stat_blocked → I/O blocked time (ns)
    - sched_stat_runtime → kernel-measured CPU time
    - sched_stat_wait    → run queue wait time
    - sched_process_fork → parent/child tracking

scheduling:
  engine: sched_ext (SCX)
  method: priority-based vtime + preempt
  priority_scale: -100 (lowest) to +100 (highest)
  select_cpu: priority >= 80 → pick_idle_cpu + SCX_DSQ_LOCAL + SCX_KICK_PREEMPT
  enqueue: vtime -= priority * slice / 10
  dispatch: single SHARED_DSQ, vtime-ordered consumption
  running/stopping: vtime accounting with weight

decision:
  source: LLMDecisionSkill (unified engine)
  format: PRIORITY: pid=X value=Y reason=Z
  fallback: all tasks at priority 0 (fair vtime scheduling)

kernel_requirements:
  min_version: "6.6"
  config:
    - CONFIG_SCHED_CLASS_EXT=y
    - CONFIG_BPF_SYSCALL=y
    - CONFIG_DEBUG_INFO_BTF=y
