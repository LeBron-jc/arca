name: SecurityPolicy
version: "1.0"
category: security
description: >
  安全策略Agent。3个tracepoint监控进程生命周期(执行/退出/mount)。
  bpf_send_signal(9)在内核态拦截/tmp/和/dev/shm/的可疑执行。
  数据上报LLM进行全局关联分析。

hooks:
  - sched_process_exec  → 进程执行 + 文件名
  - sched_process_exit  → 进程退出
  - sys_enter_mount     → mount操作

control:
  method: bpf_send_signal(SIGKILL)
  trigger: filename前缀为/tmp/或/dev/shm/
  timing: 在execve系统调用内部，进程执行新代码之前

decision:
  source: LLMDecisionSkill
  format: ALERT: pid=X severity=Y reason=Z
