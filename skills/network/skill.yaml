name: NetworkPolicy
version: "1.0"
category: network
description: >
  网络策略Agent。4个kprobe监控进程TCP行为(发送/接收/连接/重传)。
  数据上报LLM，LLM根据流量模式和重传率决定BLOCK指令。
  执行端用bpf_send_signal(9)在内核态原子终止阻断进程。

hooks:
  - tcp_sendmsg       → TX字节数 + PID关联
  - tcp_cleanup_rbuf  → RX字节数
  - tcp_connect       → 新连接事件
  - tcp_retransmit_skb → 重传计数(网络质量)

control:
  method: bpf_send_signal(SIGKILL)
  trigger: LLM输出 BLOCK:pid=X
  safety: killed_pids map防止重复kill

decision:
  source: LLMDecisionSkill
  format: BLOCK: pid=X reason=Y
