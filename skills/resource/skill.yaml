name: ResourceCtrl
version: "1.0"
category: resource
description: >
  资源管控Agent。2个kprobe+eBPF监控页面分配和磁盘I/O，
  配合/proc采集系统级内存/CPU。LLM根据压力输出THROTTLE指令，
  执行端动态创建per-PID cgroup子目录并迁移进程实施硬限制。

hooks:
  - __alloc_pages_nodemask → 页面分配频率
  - block_rq_issue         → 磁盘I/O次数
  - /proc/meminfo          → 系统内存使用
  - /proc/stat             → CPU使用率

control:
  method: per-PID cgroup子目录 + memory.max / cpu.max
  trigger: LLM输出 THROTTLE:type=mem|cpu value=N
  isolation: mkdir + echo限制值 + echo迁移进程

decision:
  source: LLMDecisionSkill
  format: THROTTLE: type=mem|cpu value=N reason=Z
