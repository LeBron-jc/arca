# arca.conf - ARCA configuration file

[llm]
# DeepSeek API settings
api_key              =              # DEEPSEEK_API_KEY here (or env var)
model                = deepseek-chat
temperature          = 0.3
max_tokens           = 2048
call_interval_sec    = 10           # LLM决策间隔(秒)

[resource]
# system-level thresholds
memory_alert_mb       = 6144        # 内存告警(MB)
cpu_alert_pct         = 95          # CPU告警(百分比)

[general]
# dashboard refresh interval (seconds)
refresh_interval_s    = 1
