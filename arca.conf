# arca.conf - ARCA configuration file

[cpu]
# classification thresholds (score >= threshold to classify)
interactive_min_score = 0.4
cpu_bound_min_score   = 0.4
batch_min_score       = 0.4

# time_slice in microseconds
interactive_slice_us  = 1000
normal_slice_us       = 5000
cpu_bound_slice_us    = 10000
batch_slice_us        = 20000

# ratios for decay (0-1, lower = faster decay)
decay_ratio           = 0.75

# classification update interval (seconds)
classify_interval_s   = 1

[resource]
# alert thresholds
memory_alert_mb       = 6144
cpu_alert_pct         = 95

[network]
# block specific PIDs (comma-separated)
block_pids            =

[general]
# dashboard refresh interval (seconds)
refresh_interval_s    = 1

# SCX: enable classification-based scheduling
scx_enabled           = true
